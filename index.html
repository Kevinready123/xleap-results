body{font-family:'DM Sans','Noto Serif SC',sans-serif;background:#f9f7f4;color:var(--ink);min-height:100vh}

.filter-section{position:sticky;top:0;z-index:100;background:rgba(249,247,244,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:14px 24px}
.filter-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}

.modal-story{font-size:15px;line-height:1.9;color:var(--ink-soft)}
.modal-meta{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;padding-top:20px;border-top:1px solid var(--border)}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;cursor:zoom-out}

footer{text-align:center;padding:40px 24px;font-size:13px;color:var(--ink-muted);border-top:1px solid var(--border);background:#fff}

.empty-state{grid-column:1/-1;text-align:center;padding:80px 24px;color:var(--ink-muted)}

</style>
</head>

// 检查图片是否存在（带fallback）
function loadCardImg(id, imgEl, placeholderEl) {
  var jpg = getImgUrl(id, "jpg");
  var png = getImgUrl(id, "png");
  var img = new Image();
  img.onload = function() {
    imgEl.src = jpg;
    imgEl.style.display = "block";
    placeholderEl.style.display = "none";
  };
  img.onerror = function() {
    // 尝试 PNG
    var img2 = new Image();
    img2.onload = function() {
      imgEl.src = png;
      imgEl.style.display = "block";
      placeholderEl.style.display = "none";
    };
    img2.onerror = function() {
      // 没有图片，显示占位符
      imgEl.style.display = "none";
      placeholderEl.style.display = "flex";
    };
    img2.src = png;
  };
  img.src = jpg;
}

    grid.innerHTML = '<div class="empty-state"><p>暂无相关案例，请尝试其他分类</p></div>';
    return;
  }
  var html = "";
  filtered.forEach(function(c) {
    var meta = c.board ? ("📋 " + c.board) : (c.subjects ? ("📚 " + c.subjects.replace(/,/g, " · ")) : "");
    html += '<article class="card" data-id="' + c.id + '" tabindex="0">' +
      '<div class="card-top">' +
        '<div class="card-tag-row">' +
          '<span class="tag tag-' + c.tag + '">' + c.tag + '</span>' +
          (c.date ? '<span class="card-date">' + c.date + '</span>' : '') +
        '</div>' +
        '<div class="card-headline">' + c.headline + '</div>' +
        '<div class="card-score">' + c.score_short + '</div>' +
        '<div class="card-story">' + c.story + '</div>' +
      '</div>' +
      '<div class="card-img-wrap" id="img-wrap-' + c.id + '">' +
        '<img id="card-img-' + c.id + '" src="" alt="成绩单" style="display:none">' +
        '<div class="card-img-placeholder" id="card-ph-' + c.id + '">' +
          '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>' +
          '<span>成绩单图片</span>' +
        '</div>' +
      '</div>' +
      '<div class="card-bottom">' +
        '<span class="card-board">' + meta + '</span>' +
        '<span class="read-more">查看详情 <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>' +
      '</div>' +
    '</article>';
  });
  grid.innerHTML = html;

  // 绑定点击事件 + 加载图片
  filtered.forEach(function(c) {
    var card = document.querySelector('[data-id="' + c.id + '"]');
    if (card) {
      card.addEventListener("click", function(){ openModal(c.id); });
      loadCardImg(c.id,
        document.getElementById("card-img-" + c.id),
        document.getElementById("card-ph-" + c.id)
      );
    }
  });
}

function openModal(id) {
  var c = null;
  CASES.forEach(function(x){ if (x.id === id) c = x; });
  if (!c) return;

  document.getElementById("modal-tag-row").innerHTML = '<span class="tag tag-' + c.tag + '">' + c.tag + '</span>';
  document.getElementById("modal-headline").textContent = c.headline;
  document.getElementById("modal-score").textContent = c.score_full;
  document.getElementById("modal-story").textContent = c.story;

  // 图片区域
  var imgArea = document.getElementById("modal-img-area");
  var jpg = getImgUrl(id, "jpg");
  var png = getImgUrl(id, "png");
  imgArea.innerHTML = '<div class="modal-img-placeholder" id="modal-ph"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><p>成绩单图片加载中...</p></div>';

  function tryLoad(url, fallbackUrl) {
    var img = new Image();
    img.onload = function() {
      imgArea.innerHTML = '<div class="modal-img-wrap" id="modal-img-wrap"><img src="' + url + '" alt="成绩单" id="modal-img"></div>';
      document.getElementById("modal-img-wrap").addEventListener("click", function() {
        openLightbox(url);
      });
    };
    img.onerror = function() {
      if (fallbackUrl) {
        tryLoad(fallbackUrl, null);
      } else {
        imgArea.innerHTML = '<div class="modal-img-placeholder"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg><p>暂无成绩单图片</p></div>';
      }
    };
    img.src = url;
  }
  tryLoad(jpg, png);

  var meta = [];
  if (c.date) meta.push('<span class="meta-chip">📅 ' + c.date + '</span>');
  if (c.board) meta.push('<span class="meta-chip">🏫 ' + c.board + '</span>');
  if (c.subjects) {
    c.subjects.split(",").forEach(function(s) {
      meta.push('<span class="meta-chip">📚 ' + s.trim() + '</span>');
    });
  }
  document.getElementById("modal-meta").innerHTML = meta.join("");
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function openLightbox(url) {
  document.getElementById("lightbox-img").src = url;
  document.getElementById("lightbox").classList.add("open");
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
}

// 事件绑定
document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b){ b.classList.remove("active"); });
    btn.classList.add("active");
    renderCards(btn.getAttribute("data-tag"));
    window.scrollTo({top: document.getElementById("card-grid").offsetTop - 80, behavior: "smooth"});
  });
});

document.getElementById("modal-close").addEventListener("click", closeModal);
document.getElementById("modal-overlay").addEventListener("click", function(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});
document.getElementById("lightbox").addEventListener("click", closeLightbox);
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") { closeModal(); closeLightbox(); }
});

renderCards("全部");
</script>
</body>
</html>
