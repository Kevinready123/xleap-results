@media(max-width:600px){.stats-row{gap:28px}.stat-num{font-size:28px}.grid-section{grid-template-columns:1fr;padding:8px 16px 60px}.modal-body,.modal-header{padding-left:20px;padding-right:20px}.hero{padding:56px 20px 48px}}

let activeTag='全部';
function renderCards(tag){
  const grid=document.getElementById('card-grid');
  const filtered=tag==='全部'?CASES:CASES.filter(c=>c.tag===tag);
  document.getElementById('shown-count').textContent=filtered.length;
  if(filtered.length===0){grid.innerHTML=`<div class="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><h3>暂无相关案例</h3><p>请尝试其他分类</p></div>`;return;}
  grid.innerHTML=filtered.map(c=>`
    <article class="card" onclick="openModal(${c.id})" tabindex="0" role="button" aria-label="${c.headline}">
      <div class="card-top">
        <div class="card-tag-row">
          <span class="tag tag-${c.tag}">${c.tag}</span>
          ${c.date?`<span class="card-date">${c.date}</span>`:''}
        </div>
        <div class="card-headline">${c.headline}</div>
        <div class="card-score">${c.score_short}</div>
        <div class="card-story">${c.story}</div>
      </div>
      <div class="card-img-placeholder">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        成绩单图片
      </div>
      <div class="card-bottom">
        <span class="card-board">${c.board?'📋 '+c.board:c.subjects?'📚 '+c.subjects.replace(/,/g,' · '):''}</span>
        <span class="read-more">查看详情 <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8M7 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </div>
    </article>`).join('');
}
function openModal(id){
  const c=CASES.find(x=>x.id===id);if(!c)return;
  document.getElementById('modal-tag-row').innerHTML=`<span class="tag tag-${c.tag}">${c.tag}</span>`;
  document.getElementById('modal-headline').textContent=c.headline;
  document.getElementById('modal-score').textContent=c.score_full;
  document.getElementById('modal-story').textContent=c.story;
  const meta=[];
  if(c.date)meta.push(`<span class="meta-chip">📅 ${c.date}</span>`);
  if(c.board)meta.push(`<span class="meta-chip">🏫 ${c.board}</span>`);
  if(c.subjects)c.subjects.split(',').forEach(s=>meta.push(`<span class="meta-chip">📚 ${s.trim()}</span>`));
  document.getElementById('modal-meta').innerHTML=meta.join('');
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');document.body.style.overflow='';}
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeTag=btn.dataset.tag;renderCards(activeTag);
    document.getElementById('card-grid').scrollIntoView({behavior:'smooth',block:'start'});
  });
});
document.getElementById('modal-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
renderCards('全部');
</script>
</body>
</html>
